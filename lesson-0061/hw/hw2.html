<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Document</title>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        /* background-color:rgb(27, 70, 86) ; */
        display: flex;
        justify-content: center;
        /* align-items: center; */
        margin-top: 200px;
    }

    .perent{
        display: grid;
        grid-template-columns: 1fr 1fr 1fr ;
        grid-template-rows:1fr 2fr 2fr 1fr ; 
        /* background-color: aliceblue; */
        width: 700px;
        height: 400px;
        gap: 20px;
    }
    .dv1{
        background-color: rgb(253, 153, 0);
        grid-column: 1/3 span;
    }

    .dv2{
        background-color: rgb(254, 94, 2);
        grid-row:2/4 ;
    }

    .dv3{
        background-color: rgb(204, 0, 0);
        grid-column: 2/4 ;
    }

    .dv4{
        background-color: rgb(218, 2, 255);
    }

    .dv5{
        background-color: rgb(218, 2, 255);
    }

    .dv6{
        background-color: rgb(253, 153, 0);
        grid-column: 1/3 span;
    }





</style>    
</head>
<body>
    <div class="perent">
        <div class="dv1"></div>
        <div class="dv2"></div>
        <div class="dv3"></div>
        <div class="dv4"></div>
        <div class="dv5"></div>
        <div class="dv6"></div>
    </div>
</body>
</html>
