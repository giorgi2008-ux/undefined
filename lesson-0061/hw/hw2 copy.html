<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Document</title>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        /* background-color:rgb(27, 70, 86) ; */
        display: flex;
        justify-content: center;
        /* align-items: center; */
        margin-top: 200px;
    }

    .perent{
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr ;
        grid-template-rows:1fr 2fr 2fr 2fr 1fr  ; 
        /* background-color: aliceblue; */
        width: 700px;
        height: 400px;
        gap: 10px;
    }
    .dv1{
        background-color: rgb(188, 207, 241);
        grid-column: 1/5;
        border-radius: 5px;

    }

    .dv2{
        background-color: rgb(193, 219, 205);
        grid-row: 2/5;
        border-radius: 5px;



    }

    .dv3{
        background-color: rgb(248, 215, 246);
        grid-column: 2/5;
        border-radius: 5px;
    }

    .dv4{
        background-color: rgb(255, 187, 250);
        grid-row: 3/5;
        border-radius: 5px;

    }

    .dv5{
        background-color: rgb(221, 179, 217);
        grid-row: 3/5;
        border-radius: 5px;
    }

    .dv6{
        background-color: rgb(188, 207, 241);
        grid-column: 1/5;
        border-radius: 5px;
    }
    
    .dv7{
    background-color: rgb(195, 179, 194);
    /* grid-column: 4; */
    grid-row: 3/5;
    border-radius: 5px;
    }





</style>    
</head>
<body>
    <div class="perent">
        <div class="dv1"></div>
        <div class="dv2"></div>
        <div class="dv3"></div>
        <div class="dv4"></div>
        <div class="dv5"></div>
        <div class="dv6"></div>
        <div class="dv7"></div>
    </div>
</body>
</html>
