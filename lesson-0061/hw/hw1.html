<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Document</title>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        background-color:rgb(27, 70, 86) ;
        display: flex;
        justify-content: center;
        /* align-items: center; */
        margin-top: 200px;
    }

    .perent{
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
        grid-template-rows:1fr 1fr 1fr 1fr ; 
        /* background-color: aliceblue; */
        width: 700px;
        height: 400px;
        gap: 20px;
    }
    .dv1{
        background-color: rgb(255, 255, 255);
        grid-column: 1 / 3;
    }

    .dv2{
        background-color: rgb(255, 255, 255);
        grid-column: 3 / 5;
        grid-row: 1/3;
    }

    .dv3{
        background-color: rgb(255, 255, 255);
        grid-row: 1;
        grid-column: 5;
        grid-row: 1/3;

    }

    .dv4{
        background-color: rgb(255, 255, 255);
    }

    .dv5{
        background-color: rgb(255, 255, 255);
    }

    .dv6{
        background-color: rgb(255, 255, 255);
    }

    .dv7{
        background-color: rgb(255, 255, 255);
    }

    .dv8{
        background-color: rgb(255, 255, 255);
    }

    .dv9{
        background-color: rgb(255, 255, 255);
        grid-column: 2/4;
    }

    .dv10{
        background-color: rgb(255, 255, 255);
        grid-column: 4/6;

    }

    .dv11{
        background-color: rgb(255, 255, 255);
    }




</style>    
</head>
<body>
    <div class="perent">
        <div class="dv1"></div>
        <div class="dv2"></div>
        <div class="dv3"></div>
        <div class="dv4"></div>
        <div class="dv5"></div>
        <div class="dv6"></div>
        <div class="dv7"></div>
        <div class="dv8"></div>
        <div class="dv9"></div>
        <div class="dv10"></div>
        <div class="dv11"></div>
    </div>
</body>
</html>
