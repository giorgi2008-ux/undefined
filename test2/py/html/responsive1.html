<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            /* flex-wrap: wrap; */
            gap: 10px;
            justify-content: space-between;
        }

        .box {
            width: 200px;
            height: 200px;
            background-color: red;
        }

        @media (max-width: 360px) {

            .container {
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }


        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>

</html>
